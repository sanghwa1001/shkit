    <style>
        /* 기본 레이아웃 및 버튼 디자인 */
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; width: 340px; }
        button { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; background-color: #007bff; color: white; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .bulk-btn { background-color: #28a745; } .bulk-btn:hover { background-color: #218838; }
        .delete-btn { background-color: #dc3545; } .delete-btn:hover { background-color: #c82333; }
        .secondary-btn { background-color: #6c757d; } .secondary-btn:hover { background-color: #5a6268; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }
        
        /* 목록 디자인 */
        .list-container { max-height: 250px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .list-header { display: flex; gap: 5px; margin-bottom: 10px; font-weight: bold; font-size: 13px; color: #555; text-align: center; }
        .list-header .h-id { flex: 2; } .list-header .h-pw { flex: 2; } .list-header .h-btn { flex: 2; }
        .account-item { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
        .account-item input { flex: 2; margin: 0; padding: 8px 5px; font-size: 12px; text-align: center; }
        .account-item button { flex: 1; margin: 0; padding: 8px 0; font-size: 12px; }
        .edit-btn { background-color: #28a745; } .edit-btn:hover { background-color: #218838; }
        
        /* 로비 화면 전용 디자인 */
        .lobby-title { color: #28a745; font-weight: bold; font-size: 22px; margin-top: 0; }
        .welcome-text { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .online-users-container { background-color: #f8f9fa; border: 1px solid #ddd; border-radius: 5px; padding: 15px; margin: 20px 0; text-align: left; max-height: 200px; overflow-y: auto; }
        .online-users-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        #online-users-list { display: flex; flex-wrap: wrap; gap: 20px; padding-top: 10px; justify-content: center; }
        .online-user-item { display: flex; flex-direction: column; align-items: center; font-size: 13px; color: #333; margin: 0; }
        .online-user-avatar { height: 70px; width: auto; margin-bottom: 5px; border: none; background: transparent; }
        
        /* 아바타 그리드(보관함, 상점 관리, 상점 공통) */
        .avatar-list-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; max-height: 300px; overflow-y: auto; padding: 5px; }
        .avatar-item { border: 2px solid transparent; border-radius: 10px; padding: 10px; text-align: center; background-color: #f8f9fa; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;}
        .avatar-item img { height: 70px; width: auto; margin-bottom: 8px; }
        .avatar-item.selected { border-color: #007bff; background-color: #e6f7ff; }
        .shop-checkbox { transform: scale(1.3); margin-top: 5px; cursor: pointer; }
        
        .buy-btn { width: 100%; padding: 5px; font-size: 12px; margin: 5px 0 0 0; background-color: #17a2b8; }
