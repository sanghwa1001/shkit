<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 시스템 (상점 관리 UI 개선)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 기본 레이아웃 및 버튼 디자인 */
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; width: 340px; }
        button { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; background-color: #007bff; color: white; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .bulk-btn { background-color: #28a745; } .bulk-btn:hover { background-color: #218838; }
        .delete-btn { background-color: #dc3545; } .delete-btn:hover { background-color: #c82333; }
        .secondary-btn { background-color: #6c757d; } .secondary-btn:hover { background-color: #5a6268; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }
        
        /* 목록 디자인 */
        .list-container { max-height: 250px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .list-header { display: flex; gap: 5px; margin-bottom: 10px; font-weight: bold; font-size: 13px; color: #555; text-align: center; }
        .list-header .h-id { flex: 2; } .list-header .h-pw { flex: 2; } .list-header .h-btn { flex: 2; }
        .account-item { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
        .account-item input { flex: 2; margin: 0; padding: 8px 5px; font-size: 12px; text-align: center; }
        .account-item button { flex: 1; margin: 0; padding: 8px 0; font-size: 12px; }
        .edit-btn { background-color: #28a745; } .edit-btn:hover { background-color: #218838; }
        
        /* 로비 화면 전용 디자인 */
        .lobby-title { color: #28a745; font-weight: bold; font-size: 22px; margin-top: 0; }
        .welcome-text { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .online-users-container { background-color: #f8f9fa; border: 1px solid #ddd; border-radius: 5px; padding: 15px; margin: 20px 0; text-align: left; max-height: 200px; overflow-y: auto; }
        .online-users-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        #online-users-list { display: flex; flex-wrap: wrap; gap: 20px; padding-top: 10px; justify-content: center; }
        .online-user-item { display: flex; flex-direction: column; align-items: center; font-size: 13px; color: #333; margin: 0; }
        .online-user-avatar { height: 85px; width: auto; margin-bottom: 5px; border: none; background: transparent; }
        
        /* 아바타 그리드(보관함, 상점 관리, 상점 공통) */
        .avatar-list-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; max-height: 300px; overflow-y: auto; padding: 5px; }
        .avatar-item { border: 2px solid transparent; border-radius: 10px; padding: 10px; text-align: center; background-color: #f8f9fa; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;}
        .avatar-item img { height: 85px; width: auto; margin-bottom: 8px; }
        .avatar-item.selected { border-color: #007bff; background-color: #e6f7ff; }
        .shop-checkbox { transform: scale(1.3); margin-top: 5px; cursor: pointer; }
        
        .buy-btn { width: 100%; padding: 5px; font-size: 12px; margin: 5px 0 0 0; background-color: #17a2b8; display:flex; justify-content:center; align-items:center; gap:5px; }
        .buy-btn:hover { background-color: #138496; }
        .owned-tag { font-size: 12px; color: #888; margin-top: 5px; font-weight: bold; }
        
        /* 학생 보석 표시 UI */
        .gem-display { font-size: 14px; font-weight: bold; color: #ff9800; background: #fff3cd; padding: 5px 10px; border-radius: 20px; display: inline-block; margin-bottom: 15px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

    <div class="container">
        <div id="main-page" class="page active">
            <h2>메인 화면</h2>
            <button onclick="showPage('student-page')">학생 로그인</button>
            <button onclick="showPage('admin-login-page')">관리자 로그인</button>
        </div>

        <div id="student-page" class="page">
            <h2>학생 로그인</h2>
            <input type="text" id="student-id" placeholder="학생 아이디">
            <input type="password" id="student-pw" placeholder="학생 비밀번호">
            <button onclick="checkStudentLogin()">로그인</button>
            <button class="secondary-btn" onclick="showPage('main-page')">처음으로</button>
        </div>

        <div id="admin-login-page" class="page">
            <h2>관리자 로그인</h2>
            <input type="text" id="admin-id" placeholder="관리자 아이디">
            <input type="password" id="admin-pw" placeholder="관리자 비밀번호">
            <button onclick="checkAdminLogin()">로그인</button>
            <button class="secondary-btn" onclick="showPage('main-page')">처음으로</button>
        </div>

        <div id="admin-menu-page" class="page">
            <h2>관리자 메뉴</h2>
            <button onclick="showPage('student-create-page')">학생 계정 생성</button>
            <button onclick="showManagePage()">학생 계정 수정</button>
            <button onclick="showAdminShopPage()" style="background-color: #ff9800;">상점 관리</button>
            <button class="secondary-btn" onclick="showPage('main-page')">로그아웃 (처음으로)</button>
        </div>

        <div id="student-create-page" class="page">
            <h2>학생 계정 생성</h2>
            <input type="text" id="new-student-id" placeholder="생성할 아이디">
            <input type="password" id="new-student-pw" placeholder="생성할 비밀번호">
            <button onclick="createStudentAccount()">계정 생성</button>
            <button class="bulk-btn" onclick="document.getElementById('excel-file-input').click()">학생 계정 일괄 생성</button>
            <input type="file" id="excel-file-input" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelUpload(event)">
            <button class="secondary-btn" onclick="showPage('admin-menu-page')">이전으로</button>
        </div>

        <div id="student-manage-page" class="page">
            <h2>학생 계정 목록</h2>
            <div id="student-list" class="list-container"></div>
            <button class="delete-btn" onclick="deleteAllAccounts()">학생 계정 일괄 삭제</button>
            <button class="secondary-btn" onclick="showPage('admin-menu-page')">이전으로</button>
        </div>

        <div id="admin-shop-page" class="page">
            <h2>상점 관리</h2>
            <p style="font-size: 12px; color: #555; margin-bottom: 10px;">아이콘(✏️,💎)을 눌러 정보 수정 후<br>상점에 등록할 아바타를 체크하세요.</p>
            <div id="admin-shop-list" class="avatar-list-container"></div>
            <button class="bulk-btn" onclick="saveShopItems()">판매하기 (상점 등록)</button>
            <button class="secondary-btn" onclick="showPage('admin-menu-page')">이전으로</button>
        </div>

        <div id="student-lobby-page" class="page">
            <h2 class="lobby-title">🎉 메인 로비</h2>
            <div class="welcome-text" id="welcome-message"></div>
            <div class="online-users-container">
                <div class="online-users-title">🟢 대기실</div>
                <div id="online-users-list"></div>
            </div>
            <button id="shop-btn" onclick="showStudentShopPage()" style="background-color: #ff9800;">상점</button>
            <button id="storage-btn" onclick="showStoragePage()">보관함</button>
            <button class="secondary-btn" onclick="logoutStudent()">로그아웃 (처음으로)</button>
        </div>

        <div id="student-shop-page" class="page">
            <h2>아바타 상점</h2>
            <div id="my-gems-display" class="gem-display">내 보석: 💎 0</div>
            <div id="student-shop-list" class="avatar-list-container"></div>
            <button class="secondary-btn" onclick="showPage('student-lobby-page')">이전으로</button>
        </div>

        <div id="storage-page" class="page">
            <h2>아바타 보관함</h2>
            <p style="font-size: 13px; color: #555;">원하는 아바타를 선택해주세요.</p>
            <div id="avatar-list" class="avatar-list-container"></div>
            <button class="secondary-btn" onclick="showPage('student-lobby-page')">이전으로</button>
        </div>
    </div>

    <script>
        // === 파이어베이스 설정 ===
        const firebaseConfig = {
            apiKey: "AIzaSyAs5o4rlC1-bhA4J0P8LXp54CzDQ_aRNCo",
            authDomain: "shkit-300c7.firebaseapp.com",
            projectId: "shkit-300c7",
            storageBucket: "shkit-300c7.firebasestorage.app",
            messagingSenderId: "233422083288",
            appId: "1:233422083288:web:2943bf7fdcc1c64ab333ad",
            measurementId: "G-3X7SHWR081",
            databaseURL: "https://shkit-300c7-default-rtdb.firebaseio.com" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const DEFAULT_AVATARS = ['image_0.png', 'image_1.png'];
        const ALL_SHOP_AVATARS = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png', '10.png'];
        
        let currentUser = null;
        let myCurrentAvatar = null;
        let localStudentAccounts = {}; 
        let localOnlineUsers = {}; 
        let localShopItems = []; 
        let localShopNames = {}; 
        let localShopPrices = {}; 

        // === 실시간 데이터 동기화 ===
        db.ref('studentAccounts').on('value', (snapshot) => {
            localStudentAccounts = snapshot.val() || {};
            if (document.getElementById('student-manage-page').classList.contains('active')) renderStudentList();
            if (document.getElementById('student-shop-page').classList.contains('active')) renderStudentShop();
        });

        db.ref('onlineUsers').on('value', (snapshot) => {
            localOnlineUsers = snapshot.val() || {};
            renderOnlineUsers();
        });

        db.ref('shopItems').on('value', (snapshot) => {
            localShopItems = snapshot.val() || [];
            if (document.getElementById('admin-shop-page').classList.contains('active')) renderAdminShopPage();
            if (document.getElementById('student-shop-page').classList.contains('active')) renderStudentShop();
        });

        db.ref('shopItemNames').on('value', (snapshot) => {
            localShopNames = snapshot.val() || {};
            if (document.getElementById('admin-shop-page').classList.contains('active')) renderAdminShopPage();
            if (document.getElementById('student-shop-page').classList.contains('active')) renderStudentShop();
            if (document.getElementById('storage-page').classList.contains('active')) renderAvatarList();
        });

        db.ref('shopItemPrices').on('value', (snapshot) => {
            localShopPrices = snapshot.val() || {};
            if (document.getElementById('admin-shop-page').classList.contains('active')) renderAdminShopPage();
            if (document.getElementById('student-shop-page').classList.contains('active')) renderStudentShop();
        });

        function showPage(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if (pageId === 'admin-login-page') {
                document.getElementById('admin-id').value = ''; document.getElementById('admin-pw').value = '';
            } else if (pageId === 'student-page') {
                document.getElementById('student-id').value = ''; document.getElementById('student-pw').value = '';
            } else if (pageId === 'student-create-page') {
                document.getElementById('new-student-id').value = ''; document.getElementById('new-student-pw').value = '';
            }
        }

        function checkAdminLogin() {
            const inputId = document.getElementById('admin-id').value;
            const inputPw = document.getElementById('admin-pw').value;
            if (inputId === 'sanghwa1001' && inputPw === 'tkdghk2441?') {
                showPage('admin-menu-page');
            } else {
                alert('관리자 정보가 일치하지 않습니다.');
            }
        }

        function createStudentAccount() {
            const newId = document.getElementById('new-student-id').value.trim();
            const newPw = document.getElementById('new-student-pw').value.trim();
            if (newId === '' || newPw === '') return alert('아이디와 비밀번호를 모두 입력해주세요.');
            if (localStudentAccounts[newId]) return alert('이미 존재하는 아이디입니다.');

            db.ref('studentAccounts/' + newId).set({
                pw: newPw,
                avatarId: DEFAULT_AVATARS[0],
                ownedAvatars: DEFAULT_AVATARS,
                gems: 10 
            });
            alert(`학생 계정(${newId})이 생성되었습니다! (기본 10보석 지급)`);
            showPage('admin-menu-page');
        }

        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                
                let successCount = 0; let duplicateCount = 0;
                let updates = {};

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row[0] === undefined || row[1] === undefined) continue;
                    const id = String(row[0]).trim(); const pw = String(row[1]).trim();
                    if (id === '' || pw === '' || id === '아이디' || id.toLowerCase() === 'id') continue;
                    if (localStudentAccounts[id]) { duplicateCount++; continue; }

                    updates[id] = { pw: pw, avatarId: DEFAULT_AVATARS[0], ownedAvatars: DEFAULT_AVATARS, gems: 10 };
                    successCount++;
                }

                if (successCount > 0) db.ref('studentAccounts').update(updates);
                alert(`일괄 등록 완료!\n생성: ${successCount}개\n중복 제외: ${duplicateCount}개`);
                event.target.value = ''; showPage('admin-menu-page');
            };
            reader.readAsArrayBuffer(file);
        }

        function showManagePage() {
            renderStudentList();
            showPage('student-manage-page');
        }

        function renderStudentList() {
            const listDiv = document.getElementById('student-list');
            listDiv.innerHTML = '';
            const ids = Object.keys(localStudentAccounts);
            if (ids.length === 0) {
                listDiv.innerHTML = '<p style="color: #888; font-size: 14px;">생성된 학생 계정이 없습니다.</p>'; return;
            }
            listDiv.innerHTML = `<div class="list-header"><div class="h-id">아이디</div><div class="h-pw">비밀번호</div><div class="h-btn">관리</div></div>`;
            ids.forEach((id) => {
                const account = localStudentAccounts[id];
                const itemDiv = document.createElement('div');
                itemDiv.className = 'account-item';
                itemDiv.innerHTML = `
                    <input type="text" value="${id}" readonly style="background:#eee;">
                    <input type="text" id="edit-pw-${id}" value="${account.pw}" placeholder="비밀번호">
                    <button class="edit-btn" onclick="updateAccount('${id}')">수정</button>
                    <button class="delete-btn" onclick="deleteAccount('${id}')">삭제</button>
                `;
                listDiv.appendChild(itemDiv);
            });
        }

        function updateAccount(id) {
            const newPw = document.getElementById(`edit-pw-${id}`).value.trim();
            if (newPw === '') return alert('비밀번호를 입력해주세요.');
            db.ref('studentAccounts/' + id).update({ pw: newPw });
            alert('비밀번호가 성공적으로 수정되었습니다.');
        }

        function deleteAccount(id) {
            if (localOnlineUsers[id]) return alert('현재 접속 중인 학생은 삭제할 수 없습니다.');
            if (confirm('정말 삭제하시겠습니까?')) db.ref('studentAccounts/' + id).remove();
        }

        function deleteAllAccounts() {
            if (Object.keys(localStudentAccounts).length === 0) return alert('삭제할 계정이 없습니다.');
            if (Object.keys(localOnlineUsers).length > 0) return alert('접속 중인 학생이 있어 삭제할 수 없습니다.');
            if (confirm('⚠️ 모든 학생 계정을 삭제하시겠습니까?')) db.ref('studentAccounts').remove();
        }

        // === 상점 관리 페이지 (관리자용) ===
        function showAdminShopPage() {
            renderAdminShopPage();
            showPage('admin-shop-page');
        }

        function renderAdminShopPage() {
            const listDiv = document.getElementById('admin-shop-list');
            listDiv.innerHTML = '';

            ALL_SHOP_AVATARS.forEach((avatarId, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'avatar-item';
                const isChecked = localShopItems.includes(avatarId) ? 'checked' : '';
                const dbKey = avatarId.replace('.', '_');
                
                const currentName = localShopNames[dbKey] || `아바타 ${index + 1}`;
                const currentPrice = localShopPrices[dbKey] !== undefined ? localShopPrices[dbKey] : 1;
                
                itemDiv.innerHTML = `
                    <img src="${avatarId}" alt="아바타">
                    
                    <div id="view-name-mode-${index}" style="margin-top: 5px; display:flex; align-items:center; gap:5px; justify-content:center;">
                        <span style="font-size: 12px; color: #333; font-weight:bold;">${currentName}</span>
                        <span title="이름 수정" style="cursor: pointer; font-size: 12px; background: #eee; padding: 2px 4px; border-radius: 4px;" onclick="enableEditMode(event, ${index}, 'name')">✏️</span>
                    </div>
                    <div id="edit-name-mode-${index}" style="margin-top: 5px; display:none; align-items:center; gap:5px; justify-content:center;">
                        <input type="text" id="name-input-${index}" value="${currentName}" style="width: 80px; padding: 2px; font-size: 11px; text-align: center; border: 1px solid #ccc; border-radius: 3px;" onclick="event.stopPropagation();" onkeypress="handleEnter(event, '${avatarId}', ${index}, 'name')">
                        <span title="저장" style="cursor: pointer; font-size: 12px; background: #d4edda; color: #155724; padding: 2px 4px; border-radius: 4px;" onclick="saveSingleData(event, '${avatarId}', ${index}, 'name')">✔️</span>
                    </div>

                    <div id="view-price-mode-${index}" style="margin-top: 5px; margin-bottom: 5px; display:flex; align-items:center; gap:5px; justify-content:center;">
                        <span style="font-size: 12px; color: #ff9800; font-weight:bold;">${currentPrice}</span>
                        <span title="가격 수정" style="cursor: pointer; font-size: 12px; background: #eee; padding: 2px 4px; border-radius: 4px;" onclick="enableEditMode(event, ${index}, 'price')">💎</span>
                    </div>
                    <div id="edit-price-mode-${index}" style="margin-top: 5px; margin-bottom: 5px; display:none; align-items:center; gap:5px; justify-content:center;">
                        <input type="number" id="price-input-${index}" value="${currentPrice}" min="0" style="width: 50px; padding: 2px; font-size: 11px; text-align: center; border: 1px solid #ccc; border-radius: 3px;" onclick="event.stopPropagation();" onkeypress="handleEnter(event, '${avatarId}', ${index}, 'price')">
                        <span title="저장" style="cursor: pointer; font-size: 12px; background: #d4edda; color: #155724; padding: 2px 4px; border-radius: 4px;" onclick="saveSingleData(event, '${avatarId}', ${index}, 'price')">✔️</span>
                    </div>

                    <input type="checkbox" id="shop-cb-${index}" class="shop-checkbox" value="${avatarId}" ${isChecked}>
                `;
                
                itemDiv.onclick = (e) => {
                    if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'SPAN') {
                        const cb = document.getElementById(`shop-cb-${index}`);
                        cb.checked = !cb.checked;
                    }
                };
                listDiv.appendChild(itemDiv);
            });
        }

        // [수정] 타입(name, price)에 따라 분리하여 수정창 띄우기
        function enableEditMode(event, index, type) {
            event.stopPropagation();
            document.getElementById(`view-${type}-mode-${index}`).style.display = 'none';
            
            const editMode = document.getElementById(`edit-${type}-mode-${index}`);
            editMode.style.display = 'flex';
            
            const inputField = document.getElementById(`${type}-input-${index}`);
            inputField.focus(); 
        }

        function saveSingleData(event, avatarId, index, type) {
            event.stopPropagation();
            const inputField = document.getElementById(`${type}-input-${index}`);
            const newValue = inputField.value.trim();
            const dbKey = avatarId.replace('.', '_');

            if (type === 'name') {
                const currentNameInDB = localShopNames[dbKey];
                if (newValue === '') {
                    if (currentNameInDB !== undefined) db.ref('shopItemNames/' + dbKey).remove().then(() => renderAdminShopPage());
                    else renderAdminShopPage(); 
                } else {
                    if (newValue !== currentNameInDB) db.ref('shopItemNames/' + dbKey).set(newValue).then(() => renderAdminShopPage());
                    else renderAdminShopPage(); 
                }
            } else if (type === 'price') {
                const currentPriceInDB = localShopPrices[dbKey] !== undefined ? localShopPrices[dbKey] : 1;
                let parsedPrice = parseInt(newValue, 10);
                
                if (isNaN(parsedPrice) || parsedPrice < 0) parsedPrice = 1;

                if (parsedPrice !== currentPriceInDB) {
                    db.ref('shopItemPrices/' + dbKey).set(parsedPrice).then(() => renderAdminShopPage());
                } else {
                    renderAdminShopPage();
                }
            }
        }

        function handleEnter(event, avatarId, index, type) {
            if(event.key === 'Enter') {
                saveSingleData(event, avatarId, index, type);
            }
        }

        function saveShopItems() {
            let selectedItems = [];
            ALL_SHOP_AVATARS.forEach((avatarId, index) => {
                const cb = document.getElementById(`shop-cb-${index}`);
                if (cb && cb.checked) selectedItems.push(avatarId);
            });
            
            db.ref('shopItems').set(selectedItems);
            alert('체크한 항목들이 상점에 등록되었습니다!');
            showPage('admin-menu-page');
        }

        // === 학생 로그인 및 로비 기능 ===
        function checkStudentLogin() {
            const inputId = document.getElementById('student-id').value.trim();
            const inputPw = document.getElementById('student-pw').value.trim();
            const account = localStudentAccounts[inputId];

            if (account && account.pw === inputPw) {
                currentUser = inputId;
                myCurrentAvatar = account.avatarId || DEFAULT_AVATARS[0];
                
                if (!account.ownedAvatars) db.ref('studentAccounts/' + currentUser).update({ ownedAvatars: DEFAULT_AVATARS });
                if (account.gems === undefined) db.ref('studentAccounts/' + currentUser).update({ gems: 10 });

                document.getElementById('welcome-message').innerText = `${inputId}님, 반갑습니다! 🥳`;
                
                const myOnlineRef = db.ref('onlineUsers/' + currentUser);
                myOnlineRef.set({ avatarId: myCurrentAvatar });
                myOnlineRef.onDisconnect().remove(); 

                showPage('student-lobby-page');
                renderOnlineUsers(); 
            } else {
                alert('아이디 또는 비밀번호가 틀렸습니다.');
            }
        }

        function logoutStudent() {
            if (currentUser) {
                db.ref('onlineUsers/' + currentUser).remove();
                currentUser = null;
            }
            showPage('main-page');
        }

        function renderOnlineUsers() {
            const listDiv = document.getElementById('online-users-list');
            listDiv.innerHTML = '';
            const ids = Object.keys(localOnlineUsers);
            if (ids.length === 0) {
                listDiv.innerHTML = '<p style="color: #888; font-size: 13px;">현재 대기실에 아무도 없습니다.</p>'; return;
            }
            ids.forEach(id => {
                const user = localOnlineUsers[id];
                const userDiv = document.createElement('div');
                userDiv.className = 'online-user-item';
                const isMe = (id === currentUser) ? '<span style="color: #007bff; font-weight:bold;">(나)</span>' : '';
                userDiv.innerHTML = `<img src="${user.avatarId}" alt="아바타" class="online-user-avatar"><span>${id} ${isMe}</span>`;
                listDiv.appendChild(userDiv);
            });
        }

        // === 학생 상점 및 보석 구매 기능 ===
        function showStudentShopPage() {
            renderStudentShop();
            showPage('student-shop-page');
        }

        function renderStudentShop() {
            const listDiv = document.getElementById('student-shop-list');
            listDiv.innerHTML = '';

            const myGems = localStudentAccounts[currentUser]?.gems || 0;
            document.getElementById('my-gems-display').innerText = `내 보석: 💎 ${myGems}`;

            if (localShopItems.length === 0) {
                listDiv.innerHTML = '<p style="color: #888; font-size: 13px; grid-column: span 2;">현재 등록된 상품이 없습니다.</p>';
                return;
            }

            const myOwnedAvatars = localStudentAccounts[currentUser]?.ownedAvatars || DEFAULT_AVATARS;

            localShopItems.forEach(avatarId => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'avatar-item';
                
                const dbKey = avatarId.replace('.', '_');
                const avatarName = localShopNames[dbKey] || `${avatarId.split('.')[0]}번 아바타`;
                const avatarPrice = localShopPrices[dbKey] !== undefined ? localShopPrices[dbKey] : 1;
                
                const nameText = `<span style="font-size: 12px; color: #333; font-weight:bold;">${avatarName}</span>`;
                
                if (myOwnedAvatars.includes(avatarId)) {
                    itemDiv.innerHTML = `
                        <img src="${avatarId}" alt="아바타" style="opacity: 0.5;">
                        ${nameText}
                        <div class="owned-tag">보유 중</div>
                    `;
                } else {
                    itemDiv.innerHTML = `
                        <img src="${avatarId}" alt="아바타">
                        ${nameText}
                        <button class="buy-btn" onclick="buyAvatar('${avatarId}')">💎 ${avatarPrice} 구입하기</button>
                    `;
                }
                listDiv.appendChild(itemDiv);
            });
        }

        function buyAvatar(avatarId) {
            const dbKey = avatarId.replace('.', '_');
            const price = localShopPrices[dbKey] !== undefined ? localShopPrices[dbKey] : 1;
            
            let myOwnedAvatars = localStudentAccounts[currentUser]?.ownedAvatars || DEFAULT_AVATARS;
            let myGems = localStudentAccounts[currentUser]?.gems || 0;

            if (myOwnedAvatars.includes(avatarId)) return alert('이미 보유한 아바타입니다.');
            
            if (myGems < price) {
                alert('보석이 부족합니다!');
                return;
            }

            myGems -= price; 
            myOwnedAvatars.push(avatarId); 
            
            db.ref('studentAccounts/' + currentUser).update({ 
                ownedAvatars: myOwnedAvatars,
                gems: myGems
            });
            
            alert('아바타를 성공적으로 구입했습니다! 보관함에서 확인해보세요.');
        }

        // === 보관함 기능 ===
        function showStoragePage() { 
            renderAvatarList(); 
            showPage('storage-page'); 
        }

        function renderAvatarList() {
            const listDiv = document.getElementById('avatar-list');
            listDiv.innerHTML = '';
            
            const myOwnedAvatars = localStudentAccounts[currentUser]?.ownedAvatars || DEFAULT_AVATARS;
            
            myOwnedAvatars.forEach(avatarId => {
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'avatar-item';
                if (avatarId === myCurrentAvatar) avatarDiv.classList.add('selected');
                
                avatarDiv.onclick = () => changeAvatar(avatarId);
                
                let avatarName = '';
                if(avatarId === 'image_0.png') avatarName = '기본 남자';
                else if(avatarId === 'image_1.png') avatarName = '기본 여자';
                else {
                    avatarName = localShopNames[avatarId.replace('.', '_')] || `${avatarId.split('.')[0]}번 아바타`;
                }

                avatarDiv.innerHTML = `
                    <img src="${avatarId}" alt="아바타">
                    <p style="font-size: 12px; color: #333; margin-top: 10px; font-weight:bold;">${avatarName}</p>
                `;
                listDiv.appendChild(avatarDiv);
            });
        }

        function changeAvatar(newAvatarId) {
            myCurrentAvatar = newAvatarId;
            db.ref('studentAccounts/' + currentUser).update({ avatarId: newAvatarId });
            db.ref('onlineUsers/' + currentUser).update({ avatarId: newAvatarId });
            renderAvatarList();
            alert('아바타가 성공적으로 변경되었습니다!');
        }
    </script>
</body>
</html>
